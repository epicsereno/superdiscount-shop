<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#D72B2B">
    <title>Sign In | Super Discount El Sereno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

    <div class="login-wrap">
        <a class="login-logo" href="https://epicsereno.github.io/superdiscount/" aria-label="Super Discount home">
            <span>Super</span>
            <strong>Discount</strong>
        </a>

        <div class="login-card">
            <p class="eyebrow">El Sereno</p>
            <h1 class="login-heading">Welcome</h1>
            <p class="login-sub">Sign in, create an account, or browse as a guest.</p>

            <div class="login-tabs" role="tablist" aria-label="Sign in or create account">
                <button class="login-tab is-active" data-panel="signin" role="tab" aria-selected="true" type="button">Sign In</button>
                <button class="login-tab" data-panel="register" role="tab" aria-selected="false" type="button">Create Account</button>
            </div>

            <!-- Sign in -->
            <form class="login-form" id="signin-form" role="tabpanel" novalidate>
                <div class="field-group">
                    <label class="field-label" for="signin-email">Email</label>
                    <input class="field-input" type="email" id="signin-email" name="email"
                           autocomplete="email" placeholder="you@example.com" required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="signin-password">Password</label>
                    <input class="field-input" type="password" id="signin-password" name="password"
                           autocomplete="current-password" placeholder="••••••••" required>
                </div>

                <p class="login-error" id="signin-error" hidden>Incorrect email or password. Try again.</p>

                <button class="btn btn-primary login-submit" type="submit">Sign In</button>
            </form>

            <!-- Create account -->
            <form class="login-form" id="register-form" role="tabpanel" novalidate hidden>
                <div class="field-group">
                    <label class="field-label" for="register-name">Name</label>
                    <input class="field-input" type="text" id="register-name" name="name"
                           autocomplete="name" placeholder="Your name" required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="register-email">Email</label>
                    <input class="field-input" type="email" id="register-email" name="email"
                           autocomplete="email" placeholder="you@example.com" required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="register-password">Password</label>
                    <input class="field-input" type="password" id="register-password" name="password"
                           autocomplete="new-password" placeholder="At least 6 characters" required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="register-confirm">Confirm Password</label>
                    <input class="field-input" type="password" id="register-confirm" name="confirm"
                           autocomplete="new-password" placeholder="••••••••" required>
                </div>

                <p class="login-error" id="register-error" hidden></p>

                <button class="btn btn-primary login-submit" type="submit">Create Account</button>
            </form>

            <div class="login-divider"><span>or</span></div>
            <button class="btn btn-secondary login-guest" id="guest-btn" type="button">Browse as Guest</button>

            <p class="login-help">Store staff? Sign in with your store account.</p>
        </div>

        <a class="login-back" href="https://epicsereno.github.io/superdiscount/">← Back to store info</a>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
